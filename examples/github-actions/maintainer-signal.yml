name: Maintainer Signal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  issues: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Maintainer Signal
        run: python -m pip install git+https://github.com/hindriix/maintainer-signal.git

      - name: Generate maintainer report
        env:
          GH_TOKEN: ${{ github.token }}
        run: maintainer-signal . --issue-limit 100 --output MAINTAINER_SIGNAL.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: maintainer-signal-report
          path: MAINTAINER_SIGNAL.md
